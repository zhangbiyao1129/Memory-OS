services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: memory_os
      POSTGRES_USER: memory_os
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-replace-me-local-only}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memory_os -d memory_os"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.14.1
    ports:
      - "18083:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__MAX_REQUEST_SIZE_MB: 16

  memory-api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    env_file:
      - ../.env.example
    environment:
      MEMORY_API_ADDR: :18081
      POSTGRES_DSN: postgres://memory_os:${POSTGRES_PASSWORD:-replace-me-local-only}@postgres:5432/memory_os?sslmode=disable
      REDIS_ADDR: redis:6379
      QDRANT_URL: http://qdrant:6333
      NO_PROXY: localhost,127.0.0.1,postgres,redis,qdrant
      no_proxy: localhost,127.0.0.1,postgres,redis,qdrant
    ports:
      - "18081:18081"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started

  memory-worker:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.worker
    env_file:
      - ../.env.example
    environment:
      POSTGRES_DSN: postgres://memory_os:${POSTGRES_PASSWORD:-replace-me-local-only}@postgres:5432/memory_os?sslmode=disable
      REDIS_ADDR: redis:6379
      QDRANT_URL: http://qdrant:6333
      NO_PROXY: localhost,127.0.0.1,postgres,redis,qdrant
      no_proxy: localhost,127.0.0.1,postgres,redis,qdrant
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started

  memory-mcp:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.mcp
    env_file:
      - ../.env.example
    environment:
      MEMORY_MCP_ADDR: :18082
      NO_PROXY: localhost,127.0.0.1,postgres,redis,qdrant
      no_proxy: localhost,127.0.0.1,postgres,redis,qdrant
    ports:
      - "18082:18082"

  memory-web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.web
    ports:
      - "18080:18080"
    depends_on:
      - memory-api

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
